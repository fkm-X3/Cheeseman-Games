<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Combat - Overhauled Edition</title>
    <link rel="stylesheet" href="./style-v2.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Rainbow overlay effects -->
    <div id="rainbow-overlay" class="rainbow-overlay"></div>
    <div id="rainbow-text" class="rainbow-text"></div>

    <!-- Main Menu Screen -->
    <div id="screen-main" class="menu-screen">
        <div class="menu-container">
            <h1 class="game-title">CUBE COMBAT</h1>
            <p class="game-subtitle">Overhauled Edition v2.0</p>
            
            <div class="menu-buttons">
                <button id="btn-start-ai" class="menu-btn menu-btn-primary">Quick Match</button>
                <button id="btn-story" class="menu-btn">Story Mode</button>
                <button id="btn-tournament" class="menu-btn">Tournament</button>
                <button id="btn-boss-rush" class="menu-btn">Boss Rush</button>
                <button id="btn-multiplayer" class="menu-btn">Multiplayer</button>
                <button id="btn-characters" class="menu-btn">Characters</button>
                <button id="btn-progression" class="menu-btn">Progression</button>
                <button id="btn-settings" class="menu-btn">Settings</button>
            </div>
            
            <div class="version-info">
                <p>Build: Alpha 0.1.0 | Foundation Phase</p>
            </div>
        </div>
    </div>

    <!-- Character Selection Screen -->
    <div id="screen-character-select" class="menu-screen" style="display: none;">
        <div class="menu-container" style="max-width: 900px;">
            <h2>Select Your Character</h2>
            <p class="selected-display">Selected: <span id="selected-character">Sword Master</span></p>
            
            <div id="character-grid" class="character-grid">
                <!-- Characters populated by JS -->
            </div>
            
            <div class="menu-buttons" style="flex-direction: row; gap: 20px; margin-top: 30px;">
                <button class="menu-btn" data-back="screen-main">Back</button>
                <button id="btn-start-match" class="menu-btn menu-btn-primary">Start Match</button>
            </div>
        </div>
    </div>

    <!-- Settings Screen -->
    <div id="screen-settings" class="menu-screen" style="display: none;">
        <div class="menu-container">
            <h2>Settings</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label>Master Volume</label>
                    <input type="range" id="setting-volume-master" min="0" max="100" value="100">
                </div>
                <div class="setting-item">
                    <label>Music Volume</label>
                    <input type="range" id="setting-volume-music" min="0" max="100" value="70">
                </div>
                <div class="setting-item">
                    <label>SFX Volume</label>
                    <input type="range" id="setting-volume-sfx" min="0" max="100" value="80">
                </div>
                <div class="setting-item">
                    <label>Screen Shake</label>
                    <input type="checkbox" id="setting-screenshake" checked>
                </div>
                <div class="setting-item">
                    <label>Particles</label>
                    <input type="checkbox" id="setting-particles" checked>
                </div>
                <div class="setting-item">
                    <label>Show FPS</label>
                    <input type="checkbox" id="setting-fps">
                </div>
            </div>
            <button class="menu-btn" data-back="screen-main">Back</button>
        </div>
    </div>

    <!-- Game Screen (actual gameplay) -->
    <div id="screen-game" style="display: none;">
        <div class="main-wrapper">
            <!-- Player 1 Sidebar -->
            <div id="p1-sidebar" class="sidebar p1">
                <div class="sb-header-row">
                    <div id="p1-sb-icon" class="sb-icon"></div>
                    <div id="p1-sb-name" class="sb-name">Player 1</div>
                </div>

                <div class="sb-health-container">
                    <div id="p1-sb-health" class="sb-health-bar"></div>
                </div>

                <div class="sb-stat-box">
                    <div class="sb-stat-label">Attack 1</div>
                    <div id="p1-sb-cd1" class="sb-stat-value">READY</div>
                </div>
                <div class="sb-stat-box">
                    <div class="sb-stat-label">Attack 2</div>
                    <div id="p1-sb-cd2" class="sb-stat-value">READY</div>
                </div>
            </div>

            <!-- Game Canvas -->
            <div class="canvas-container">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
                
                <!-- HUD Overlay -->
                <div class="hud-overlay">
                    <div class="match-timer">99</div>
                </div>
            </div>

            <!-- Player 2 Sidebar -->
            <div id="p2-sidebar" class="sidebar p2">
                <div class="sb-header-row">
                    <div id="p2-sb-icon" class="sb-icon"></div>
                    <div id="p2-sb-name" class="sb-name">Player 2</div>
                </div>

                <div class="sb-health-container">
                    <div id="p2-sb-health" class="sb-health-bar"></div>
                </div>

                <div class="sb-stat-box">
                    <div class="sb-stat-label">Attack 1</div>
                    <div id="p2-sb-cd1" class="sb-stat-value">READY</div>
                </div>
                <div class="sb-stat-box">
                    <div class="sb-stat-label">Attack 2</div>
                    <div id="p2-sb-cd2" class="sb-stat-value">READY</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Load game as ES6 module -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
