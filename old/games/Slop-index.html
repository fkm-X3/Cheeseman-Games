<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Slop Index | CheeseMan Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="css/slop-index.css">
</head>
<body class="hub-container">

<!-- Back Navigation -->
<nav class="back-nav">
    <a href="../index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back to Home</span>
    </a>
</nav>

<!-- Header -->
<header class="hub-header">
    <h1 class="hub-title">The Slop Index</h1>
    <span class="hub-badge">Experimental</span>
</header>

<!-- Desktop Area -->
<div class="desktop" id="desktop">
    <!-- Desktop Icons -->
    <div class="icon-card" onclick="openWindow('fentsim', 'slop/fent-sim.html', 'FENT SIM')">
        <div class="icon-box icon-gradient-red">🧟</div>
        <span class="icon-label">Fent Sim</span>
    </div>

    <div class="icon-card" onclick="openWindow('gd', 'slop/gd.html', 'Geometry Dash')">
        <div class="icon-box icon-gradient-green">📐</div>
        <span class="icon-label">GD Clone</span>
    </div>

    <div class="icon-card" onclick="openWindow('gdeditor', 'slop/gd-editor.html', 'Level Editor')">
        <div class="icon-box icon-gradient-blue">🛠️</div>
        <span class="icon-label">GD Editor</span>
    </div>

    <div class="icon-card" onclick="openWindow('casino', 'slop/sketchy-caisno-(legacy).html', 'Sketchy Casino')">
        <div class="icon-box icon-gradient-orange">🎰</div>
        <span class="icon-label">Casino</span>
    </div>
</div>

<!-- Taskbar -->
<div class="hub-taskbar">
    <div class="flex gap-3" id="taskbar-items">
        <!-- Minimized apps appear here -->
    </div>
</div>

<script src="js/slop-index.js"></script>
</body>
</html>
